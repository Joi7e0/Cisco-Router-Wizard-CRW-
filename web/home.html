<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cisco Router Wizard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="home.css">
  <link rel="icon" href="photo/crw-logo.jpg" type="image/x-icon">
</head>

<body>
  <div class="app-container">

    <!-- Header Removed as per new layout -->
    <button class="settings-trigger" onclick="toggleSettings()" title="Settings">
      <i class="ph-bold ph-gear-six"></i>
    </button>

    <!-- Main Title -->
    <section class="hero-section">
      <div class="logo-centered">
        <img src="photo/crw-logo.jpg" alt="CRW Logo">
      </div>
      <h1 id="welcomeTitle">Welcome to Cisco<br>Router Setup Wizard!</h1>
    </section>

    <div class="action-cards">
      <div class="card" id="cardOffline" onclick="selectAction('offline')">
        <img src="photo/ofline.jpg" class="card-img" alt="Offline Card">
        <span class="card-title" id="cardOfflineTitle">Start Offline</span>
      </div>
      <div class="card" id="cardConnect" onclick="selectAction('connect')">
        <img src="photo/online.jpg" class="card-img" alt="Online Card">
        <span class="card-title" id="cardConnectTitle">Start Online</span>
      </div>
    </div>

    <!-- Primary Action -->
    <button class="primary-btn" id="btnStartConfig" onclick="startConfig()" disabled>Start Configuration</button>

    <!-- Settings Modal Overlay -->
    <div class="modal-overlay" id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
      <div class="settings-modal" id="settingsModal">
        <div class="modal-header">
          <h2 id="settingsHeaderTitle">Settings</h2>
          <button class="close-modal" onclick="toggleSettings()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-row">
            <div class="setting-info">
              <i class="ph-bold ph-moon" id="theme-icon"></i>
              <span id="lblDarkTheme">Dark Theme</span>
            </div>
            <div class="setting-control">
              <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-row">
            <div class="setting-info">
              <i class="ph-bold ph-globe"></i>
              <span id="lblLanguage">Language</span>
            </div>
            <div class="setting-control">
              <div class="lang-selector" id="langSelector">
                <span id="currentLang">ENG</span>
                <i class="ph ph-caret-right"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let selectedAction = null;

    function selectAction(action) {
      selectedAction = action;
      localStorage.setItem('crw_mode', action); // Persist mode

      // Remove active class from all
      document.getElementById('cardConnect').classList.remove('active');
      document.getElementById('cardOffline').classList.remove('active');

      // Add active to selected
      if (action === 'connect') {
        document.getElementById('cardConnect').classList.add('active');
        updateStatus('online');
      } else {
        document.getElementById('cardOffline').classList.add('active');
        updateStatus('offline');
      }

      // Enable primary button
      document.getElementById('btnStartConfig').disabled = false;
    }

    function updateStatus(status) {
      const text = document.getElementById('statusText');
      const dot = document.querySelector('.status-dot');
      const lang = currentLangElem.textContent;

      if (status === 'online') {
        if (text) text.textContent = translations[lang].statusOnline;
        if (dot) dot.className = 'status-dot green';
      } else {
        if (text) text.textContent = translations[lang].statusOffline;
        if (dot) dot.className = 'status-dot orange';
      }
    }

    function startConfig() {
      if (selectedAction) {
        location.href = 'index.html';
      }
    }

    function toggleSettings() {
      const overlay = document.getElementById('settingsOverlay');
      overlay.classList.toggle('active');
    }

    function closeSettingsIfOutside(event) {
      if (event.target.id === 'settingsOverlay') {
        toggleSettings();
      }
    }

    // Language System
    const translations = {
      'ENG': {
        statusOffline: 'Status: Offline',
        statusOnline: 'Status: Online',
        welcomeTitle: 'Welcome to Cisco<br>Router Setup Wizard!',
        btnStartConfig: 'Start Configuration',
        settingsHeaderTitle: 'Settings',
        lblDarkTheme: 'Dark Theme',
        lblLanguage: 'Language',
        langLabel: 'Eng'
      },
      'UA': {
        statusOffline: 'Статус: Офлайн',
        statusOnline: 'Статус: Онлайн',
        welcomeTitle: 'Вітаємо у Cisco<br>Router Setup Wizard!',
        btnStartConfig: 'Почати конфігурацію',
        settingsHeaderTitle: 'Налаштування',
        lblDarkTheme: 'Темна тема',
        lblLanguage: 'Мова',
        langLabel: 'UA'
      },
      'DE': {
        statusOffline: 'Status: Offline',
        statusOnline: 'Status: Online',
        welcomeTitle: 'Willkommen beim Cisco<br>Router Setup Wizard!',
        btnStartConfig: 'Konfiguration starten',
        settingsHeaderTitle: 'Einstellungen',
        lblDarkTheme: 'Dunkles Design',
        lblLanguage: 'Sprache',
        langLabel: 'De'
      }
    };

    const langs = ['ENG', 'UA', 'DE'];
    let currentLangIdx = 0;

    const langSelector = document.getElementById('langSelector');
    const currentLangElem = document.getElementById('currentLang');

    function updateLanguage(langCode) {
      localStorage.setItem('crw_lang', langCode); // Save for cross-page sync

      const t = translations[langCode];

      // Status text depends on online/offline state
      updateStatus(selectedAction === 'connect' ? 'online' : 'offline');

      document.getElementById('welcomeTitle').innerHTML = t.welcomeTitle;
      document.getElementById('btnStartConfig').textContent = t.btnStartConfig;
      document.getElementById('settingsHeaderTitle').textContent = t.settingsHeaderTitle;
      document.getElementById('lblDarkTheme').textContent = t.lblDarkTheme;
      document.getElementById('lblLanguage').textContent = t.lblLanguage;
      currentLangElem.textContent = langCode; // Display Eng, UA, De directly
    }

    langSelector.addEventListener('click', () => {
      currentLangIdx = (currentLangIdx + 1) % langs.length;
      updateLanguage(langs[currentLangIdx]);
    });

    // Theme Toggle System
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('theme-icon');

    // Initial setup
    const savedLang = localStorage.getItem('crw_lang');
    if (savedLang && langs.includes(savedLang)) {
      currentLangIdx = langs.indexOf(savedLang);
      updateLanguage(savedLang);
    }

    const savedTheme = localStorage.getItem('crw_theme');
    if (savedTheme === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.checked = true;
      themeIcon.className = 'ph-bold ph-moon';
    }

    themeToggle.addEventListener('change', (e) => {
      if (e.target.checked) {
        document.documentElement.setAttribute('data-theme', 'dark');
        localStorage.setItem('crw_theme', 'dark');
        themeIcon.className = 'ph-bold ph-moon';
      } else {
        document.documentElement.removeAttribute('data-theme');
        localStorage.setItem('crw_theme', 'light');
        themeIcon.className = 'ph-bold ph-sun';
      }
    });
  </script>
</body>

</html>
