<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cisco Router Wizard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="home.css">
  <link rel="icon" href="photo/crw-logo.jpg" type="image/x-icon">
</head>

<body>
  <div class="app-container">

    <!-- Header Removed as per new layout -->
    <button class="settings-trigger" onclick="toggleSettings()" title="Settings">
      <i class="ph-bold ph-gear-six"></i>
    </button>

    <!-- Main Title -->
    <section class="hero-section">
      <div class="logo-centered">
        <img src="photo/crw-logo.jpg" alt="CRW Logo">
      </div>
      <h1 data-i18n="welcomeTitle">Welcome to Cisco<br>Router Setup Wizard!</h1>
    </section>

    <div class="action-cards">
      <div class="card" id="cardOffline" onclick="selectAction('offline')">
        <img src="photo/ofline.jpg" class="card-img" alt="Offline Card">
        <span class="card-title" data-i18n="statusOffline">Start Offline</span>
      </div>
      <div class="card" id="cardConnect" onclick="selectAction('connect')">
        <img src="photo/online.jpg" class="card-img" alt="Online Card">
        <span class="card-title" data-i18n="statusOnline">Start Online</span>
      </div>
    </div>

    <!-- Primary Action -->
    <button class="primary-btn" id="btnStartConfig" onclick="startConfig()" disabled data-i18n="btnStartConfig">Start
      Configuration</button>

    <!-- Settings Modal Overlay -->
    <div class="modal-overlay" id="settingsOverlay" onclick="closeSettingsIfOutside(event)">
      <div class="settings-modal" id="settingsModal">
        <div class="modal-header">
          <h2 data-i18n="settingsHeaderTitle">Settings</h2>
          <button class="close-modal" onclick="toggleSettings()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-row">
            <div class="setting-info">
              <i class="ph-bold ph-moon" id="theme-icon"></i>
              <span data-i18n="lblDarkTheme">Dark Theme</span>
            </div>
            <div class="setting-control">
              <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-row">
            <div class="setting-info">
              <i class="ph-bold ph-globe"></i>
              <span data-i18n="lblLanguage">Language</span>
            </div>
            <div class="setting-control">
              <div class="lang-selector" id="langSelector">
                <span id="currentLang">ENG</span>
                <i class="ph ph-caret-right"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="i18n.js"></script>
  <script>
    let selectedAction = null;

    function selectAction(action) {
      selectedAction = action;
      localStorage.setItem('crw_mode', action); // Persist mode

      // Remove active class from all
      document.getElementById('cardConnect').classList.remove('active');
      document.getElementById('cardOffline').classList.remove('active');

      // Add active to selected
      if (action === 'connect') {
        document.getElementById('cardConnect').classList.add('active');
        updateStatus('online');
      } else {
        document.getElementById('cardOffline').classList.add('active');
        updateStatus('offline');
      }

      // Enable primary button
      document.getElementById('btnStartConfig').disabled = false;
    }

    function updateStatus(status) {
      const textElem = document.getElementById('statusText');
      const dot = document.querySelector('.status-dot');

      const lang = window.crw_i18n.getCurrentLanguage();
      // Only update if we have data (or let i18n handle it if we trigger it)
      // For immediate feedback before full dictionary might be applied:
      if (dot) {
        if (status === 'online') {
          dot.className = 'status-dot green';
          if (textElem) textElem.setAttribute("data-i18n", "statusOnline");
        } else {
          dot.className = 'status-dot orange';
          if (textElem) textElem.setAttribute("data-i18n", "statusOffline");
        }
      }

      // Re-apply current language immediately to update the status text
      window.crw_i18n.setLanguage(lang, "home");
    }

    function startConfig() {
      if (selectedAction) {
        location.href = 'index.html';
      }
    }

    function toggleSettings() {
      const overlay = document.getElementById('settingsOverlay');
      overlay.classList.toggle('active');
    }

    function closeSettingsIfOutside(event) {
      if (event.target.id === 'settingsOverlay') {
        toggleSettings();
      }
    }

    // Language System
    const validLangs = ['en', 'ua', 'de'];
    let currentLangIdx = 0;

    const langSelector = document.getElementById('langSelector');
    const currentLangElem = document.getElementById('currentLang');

    function updateLanguageUI(langCode) {
      const displayMap = { 'en': 'ENG', 'ua': 'UA', 'de': 'DE' };
      currentLangElem.textContent = displayMap[langCode];
      window.crw_i18n.setLanguage(langCode, "home");
    }

    langSelector.addEventListener('click', () => {
      currentLangIdx = (currentLangIdx + 1) % validLangs.length;
      updateLanguageUI(validLangs[currentLangIdx]);
    });

    // Theme Toggle System
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('theme-icon');

    // Initial setup
    document.addEventListener("DOMContentLoaded", () => {
      const savedLang = window.crw_i18n.getCurrentLanguage();
      if (validLangs.includes(savedLang)) {
        currentLangIdx = validLangs.indexOf(savedLang);
        updateLanguageUI(savedLang);
      } else {
        updateLanguageUI('en');
      }

      const savedTheme = localStorage.getItem('crw_theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        if (themeToggle) themeToggle.checked = true;
        if (themeIcon) themeIcon.className = 'ph-bold ph-moon';
      }
    });

    if (themeToggle) {
      themeToggle.addEventListener('change', (e) => {
        if (e.target.checked) {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('crw_theme', 'dark');
          themeIcon.className = 'ph-bold ph-moon';
        } else {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('crw_theme', 'light');
          themeIcon.className = 'ph-bold ph-sun';
        }
      });
    }
  </script>
</body>

</html>
